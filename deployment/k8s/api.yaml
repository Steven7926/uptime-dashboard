apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-api
  namespace: uptime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uptime-api
  template:
    metadata:
      labels:
        app: uptime-api
    spec:
      containers:
        - name: api
          image: uptime-api
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: DATABASE_URL
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: uptime-api
  namespace: uptime
spec:
  selector:
    app: uptime-api
  ports:
    - port: 8000
      targetPort: 8000
