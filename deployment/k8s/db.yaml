apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  namespace: uptime
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: changeme
  POSTGRES_DB: uptime_db
  DATABASE_URL: postgresql://postgres:changeme@uptime-db:5432/uptime_db
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: db-pvc
  namespace: uptime
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: uptime-db
  namespace: uptime
spec:
  replicas: 1
  selector:
    matchLabels:
      app: uptime-db
  template:
    metadata:
      labels:
        app: uptime-db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef:
                name: db-credentials
          ports:
            - containerPort: 5432
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "uptime"]
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: db-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: uptime-db
  namespace: uptime
spec:
  selector:
    app: uptime-db
  ports:
    - port: 5432
      targetPort: 5432
